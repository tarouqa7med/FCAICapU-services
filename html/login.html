<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/login-register.css">
    <title>Sign In Page</title>
</head>

<body>
    <div class="extra"></div>
    <div class="form-box">
        <h2>Sign in to Your Account</h2>
        <form id="loginForm">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="example@email.com">

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="••••••••">

            <p id="msg"></p>

            <button type="submit" id="submitBtn">
                <span class="btn-text">Sign In</span>
                <span class="loading" style="display:none;">Checking Data ...</span>
            </button>
        </form>

        <div class="links">
            <p>Forgot your password? <a href="reset-password.html">Reset it</a></p>
            <p>Don't have an Account? <a href="register.html">Sign Up</a></p>
        </div>

        <button type="button" onclick="window.location.href='../index.html'" style="padding: 10px 20px; width: auto;">
            ← Back to Home
        </button>
    </div>

    <style>
        .message {
            margin: 10px 0;
            padding: 12px;
            border-radius: 8px;
            font-weight: 500;
            text-align: center;
            font-size: 14px;
        }

        .message.success {
            background: #b6e0c0;
            color: #155724;
            border: 1px solid #b6e0c0;
        }

        .message.error {
            background: #f5c6cb;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            background: rgb(202, 232, 237);
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

    </style>

    <script src="../js/auth.js"></script>
    <script src="../js/login.js"></script>
</body>

</html>
