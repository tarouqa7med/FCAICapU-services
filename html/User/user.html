<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../../css/bootstrap/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/animations.css">
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../css/User/user.css">
    <link rel="icon" href="../../attachments/logos/logo1.png">
    <title>My Personal Page</title>
</head>

<body data-page="dashboard">
    <div class="extra"></div>
    <div class="animated-body">
        <!-- Arrow up -->
        <div class="arrow-up reveal" id="arrow-up">
            <i class="bi bi-arrow-up"></i>
        </div>

        <!-- Navbar مع الـ script المحسن -->
        <!-- ... navbar code ... -->

        <!-- 🔥 المحتوى الجديد لصفحة المستخدم -->
        <section class="user-dashboard container my-5">
            <div class="row">
                <!-- Profile Card -->
                <div class="col-md-4">
                    <div class="card profile-card">
                        <div class="card-body text-center">
                            <img id="profileImg" src="../../attachments/logos/default_user.jpg"
                                class="profile-img img-fluid rounded-circle mb-3" alt="Profile">
                            <h3 id="userName">Loading...</h3>
                            <p id="userEmail">user@example.com</p>
                            <button class="btn btn-primary" onclick="editProfile()">
                                Edit Profile
                            </button>
                        </div>
                    </div>
                </div>

                <!-- User Stats -->
                <div class="col-md-8">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <div class="card stat-card text-center">
                                <div class="card-body">
                                    <h1 id="totalDonations">0</h1>
                                    <p>EGP Donated</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card stat-card text-center">
                                <div class="card-body">
                                    <h1 id="totalProjects">0</h1>
                                    <p>Projects Backed</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card stat-card text-center">
                                <div class="card-body">
                                    <h1 id="userRank">Bronze</h1>
                                    <p>Supporter Rank</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Recent Donations -->
                    <div class="card mt-4">
                        <div class="card-header">
                            <h5>Recent Donations</h5>
                        </div>
                        <div class="card-body">
                            <div id="recentDonations">
                                <!-- Loading donations... -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Scripts -->
    <script src="../../js/main.js" defer></script>
    <script src="../../js/auth.js" defer></script>
    <script src="../../js/reveal.js" defer></script>
    <script src="../../js/User/user.js" defer></script> <!-- JS جديد -->
</body>

</html>
