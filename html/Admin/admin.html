        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('confirmLogout').onclick = () => window.authManager?.logout() || fetch('../../php/logout.php', {method: 'POST'}).then(() => location.href = '../../index.html');
            document.getElementById('cancelLogout').onclick = () => document.getElementById('logoutModal').style.display = 'none';
        });
        
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        
        function showLogoutModal() {
            document.getElementById('logoutModal').style.display = 'flex';
        }
    </script>
