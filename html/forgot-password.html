<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/login-register.css">
    <title>Reset your password</title>
    </head>
    <body class="change-password">
        <div class="extra"></div>
        <div class="form-box">
            <h2>Reset Password</h2>
            <form action="" method="post" onsubmit="event.preventDefault(); checkEmail();">
                <input type="email" id="email" placeholder="Email">
                <button type="submit">Check Email</button>
            </form>
            <p id="emailStatus"></p>
            <form action="" method="post" onsubmit="event.preventDefault(); verifyOTP();">
                <input type="text" id="otp" maxlength="6" placeholder="Enter OTP" disabled>
                <button type="submit">Check OTP</button>
            </form>
            <p id="otpStatus"></p>
            <form action="" method="post" onsubmit="event.preventDefault(); resetPassword();">
                <input type="password" id="newPassword" placeholder="New Password" disabled>
                <button type="submit">Reset Password</button>
            </form>
            <a href="login.html">Return to Login Page</a>
            <a href="register.html">Return to Register Page</a>
            <p id="resetStatus"></p>
        </div>
        <script src="../js/reset_password.js" defer></script>
    </body>
</html>
