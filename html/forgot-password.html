<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/login-register.css">
    <title>Reset your password</title>
    </head>
    <body class="change-password">
        <div class="extra"></div>
        <div class="form-box">
            <h2>Reset your password</h2>
            <p>Enter your e-mail below,<br>then you will receive OTP of 6 numbers.</p>
            <form action="" method="get">
                <input type="email" name="email" placeholder="Email" required>
                <button>Send me OTP</button>
            </form>
            <form action="" method="get">
                <input type="text" inputmode="numeric" maxlength="6" name="OTP" placeholder="OTP" required>
                <button type="submit">Reset Password</button>
            </form>
            <form action="" method="get">
                <input type="email" name="email" placeholder="Enter your new password" required>
                <button type="submit">Change Password</button>
            </form>
            <div>
            </div>
            <button onclick="window.location.href='../index.html'">Home Page</button>
        </div>
    </body>
</html>
